apiVersion: apps/v1
kind: Deployment
metadata:
  name: saisai
  labels:
    app: nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: ghcr.io/saisairepo/zombie:v1.2
      imagePullSecrets:
      - name: ghcr-registry-secret
